# Site
title:              Gustavo Goulart
bio:                'Just a software developer'
description:        "Gustavo Goulart - Just a software developer"
reading_time:       true
words_per_minute:   200
logo:               'assets/img/logo.gif'
background:         'assets/img/placeholder-min.jpg'
tiled_bg:           false   # Set this true if you want to tile your background image, otherwise it will be covered
locale:             pt_BR
url:                https://ggoulart.com

# Jekyll
permalink:          /:title/
markdown:           kramdown
highlighter:        rouge
kramdown:
  auto_ids:         true
  footnote_nr:      1
  entity_output:    as_char
  toc_levels:       1..6
  enable_coderay:   false
mathjax:            true
sass:
  sass_dir:         _sass
  style:            compressed

# Comments
disqus_shortname:   ggoulart

# Social
# if you don't have any of social below, comment the line.
google:
  #plus:            #username
  analytics:        UA-98862073-1
  #verify:
  #ad-client:
  #ad-slot:
#bing-verify:
email:              gustavo@ggoulart.com
# twitter:            ggouIart
#facebook:          username
github-url:         ggoulart
#stackoverflow:     123456/username   from a "http://stackoverflow.com/users/123456/username" link
linkedin:           ggoulart
#xing:              username
instagram:          ggou1art
lastfm:             Calimkun
#tumblr:            username
#medium:            '@username'
#pinterest:         username
#foursquare:        username
#steam:             username
#dribbble:          username
#youtube:           username
#youtube-channel:   channel
#soundcloud:        username
#weibo:             username
#flickr:            username
#codepen:           username
#keybase:           username
#xmpp:              username@server.com
#hackernews:        username
#xbox:              ggou1art

# Gems
plugins:
  - jekyll-mentions
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-seo-tag

jekyll-mentions:
    base_url: https://github.com

# SEO
lang: en_US


# Exclude list
exclude: [README.md, Gemfile, Gemfile.lock, node_modules, gulpfile.js, package.json, _site, src, vendor, CNAME, LICENSE, Rakefile]
